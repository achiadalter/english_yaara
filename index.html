<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0b0e2a">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Word Brawl ⚔️</title>
<style>
:root{
  --bg0:#0a0d24; --bg1:#141a45; --panel:#1c2350; --panel2:#252d63;
  --neon:#00e5ff; --neon2:#ff2e97; --gold:#ffd23f; --good:#25f4a0; --bad:#ff4d6d;
  --ink:#eaf0ff; --muted:#9aa6d6; --radius:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{margin:0;height:100%}
body{font-family:Rubik,"Segoe UI",Arial,sans-serif;color:var(--ink);
  background:radial-gradient(circle at 50% -10%,#26307a,#0a0d24 60%);min-height:100%;overflow-x:hidden}
#app{max-width:820px;margin:0 auto;padding:12px 14px 30px;min-height:100vh}
.screen{display:none;animation:fade .3s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
h1,h2,h3{margin:.2em 0}
.panel{background:linear-gradient(160deg,var(--panel),var(--bg1));border:1px solid #33409a;
  border-radius:var(--radius);padding:18px;margin:12px 0;box-shadow:0 8px 24px rgba(0,0,0,.35)}
button{font-family:inherit;cursor:pointer;border:none;font-weight:800}
.btn{background:linear-gradient(135deg,var(--neon),#2b8bff);color:#04122b;padding:16px;font-size:1.15rem;
  border-radius:16px;width:100%;box-shadow:0 5px 0 #0a63b8, 0 8px 18px rgba(0,229,255,.35);transition:transform .08s,box-shadow .08s}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #0a63b8}
.btn.mega{background:linear-gradient(135deg,var(--neon2),#ff7a3c);color:#fff;font-size:1.5rem;padding:22px;
  box-shadow:0 6px 0 #b01166,0 10px 26px rgba(255,46,151,.45);letter-spacing:1px}
.btn.mega:active{box-shadow:0 1px 0 #b01166}
.btn.gold{background:linear-gradient(135deg,var(--gold),#ff9f1c);color:#3a2600;box-shadow:0 5px 0 #b8860b}
.btn.ghost{background:#222a5e;color:var(--neon);box-shadow:0 4px 0 #10163a;border:1px solid #3a4699}
input,select{font-family:inherit;font-size:1.05rem;padding:13px;border-radius:13px;border:2px solid #3a4699;
  width:100%;background:#141a45;color:var(--ink)}
input::placeholder{color:#6f7ab5}
label{font-weight:700;display:block;margin:14px 0 6px}
.row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1}
.center{text-align:center}.muted{color:var(--muted)}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:6px 0}
.chip{display:inline-flex;align-items:center;gap:5px;background:#141a45;border:1px solid #3a4699;
  color:var(--ink);padding:7px 13px;border-radius:999px;font-weight:800;font-size:.95rem}
/* hero character */
.hero{display:flex;flex-direction:column;align-items:center;gap:6px}
.avatar{width:118px;height:118px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:66px;position:relative;background:radial-gradient(circle at 35% 30%,#2b356f,#161c47);
  box-shadow:0 0 0 4px #33409a, 0 0 32px var(--glow,#00e5ff);animation:float 3s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-8px)}}
.rank{font-size:.85rem;color:var(--muted)}
.namebig{font-size:1.4rem;font-weight:900}
/* progress bars */
.bar{background:#0e1236;border-radius:999px;height:16px;overflow:hidden;border:1px solid #33409a}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--good),#a3f7d0);width:0;transition:width .4s}
.hpbar>i{background:linear-gradient(90deg,#ff4d6d,#ff9f1c)}
.xpbar>i{background:linear-gradient(90deg,var(--neon),#7a5cff)}
.timebar{height:12px}.timebar>i{background:linear-gradient(90deg,var(--gold),#ff5a3c);transition:width .25s linear}
/* battle */
.enemy{display:flex;flex-direction:column;align-items:center;gap:4px}
.mon{font-size:64px;animation:float 2.4s ease-in-out infinite}
.mon.hit{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-6deg)}40%{transform:translateX(10px) rotate(6deg)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
.hearts{font-size:1.3rem;letter-spacing:3px}
.combo{font-weight:900;font-size:1.1rem;color:var(--gold);min-height:1.3em}
.combo.big{animation:pop .35s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}
.qword{font-size:2.5rem;font-weight:900;letter-spacing:.5px;margin:6px 0}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px}
.opt{background:#232b60;border:2px solid #3a4699;border-radius:16px;padding:17px;font-size:1.15rem;font-weight:800;
  color:var(--ink);min-height:62px;transition:transform .07s}
.opt:active{transform:scale(.96)}
.opt.good{background:#0e6b4a;border-color:var(--good);color:#eafff5}
.opt.bad{background:#7a1730;border-color:var(--bad);color:#ffe3e9}
@media(max-width:420px){.opts{grid-template-columns:1fr}.qword{font-size:2rem}}
.speaker{background:#232b60;border:1px solid #3a4699;border-radius:50%;width:48px;height:48px;font-size:22px;color:var(--ink)}
.dmg{position:absolute;font-weight:900;color:var(--gold);font-size:1.6rem;pointer-events:none;animation:rise 1s forwards}
@keyframes rise{to{transform:translateY(-60px);opacity:0}}
/* chest */
.chest{font-size:96px;display:inline-block}
.chest.wob{animation:wob .4s ease-in-out 4}
@keyframes wob{0%,100%{transform:rotate(0)}25%{transform:rotate(-9deg)}75%{transform:rotate(9deg)}}
.reward{display:flex;align-items:center;gap:10px;justify-content:center;background:#141a45;border:1px solid #3a4699;
  border-radius:14px;padding:12px;margin:8px 0;font-weight:800;font-size:1.1rem;animation:fade .4s}
/* character grid */
.cgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.cell{background:#141a45;border:2px solid #3a4699;border-radius:16px;padding:12px 6px;text-align:center;cursor:pointer}
.cell .ca{font-size:44px}
.cell.sel{border-color:var(--gold);box-shadow:0 0 16px var(--gold)}
.cell.lock{opacity:.4;filter:grayscale(1)}
.cell small{display:block;color:var(--muted);font-size:.8rem}
.rar{font-size:.72rem;font-weight:800;padding:2px 7px;border-radius:999px;display:inline-block;margin-top:3px}
.rar.common{background:#3a4699;color:#dfe6ff}.rar.rare{background:#1b7fd6;color:#fff}
.rar.epic{background:#a24bff;color:#fff}.rar.legendary{background:linear-gradient(90deg,#ffd23f,#ff7a3c);color:#3a2600}
/* trophy road */
.road{display:flex;gap:0;overflow-x:auto;padding:12px 4px;scroll-snap-type:x mandatory}
.mile{flex:0 0 auto;width:120px;text-align:center;scroll-snap-align:center;position:relative}
.mile .dot{width:20px;height:20px;border-radius:50%;background:#33409a;margin:8px auto;border:3px solid #0a0d24}
.mile.reached .dot{background:var(--gold)}
.mile .rw{font-size:34px}.mile .th{font-weight:800;color:var(--gold)}
.mile.claim{background:#2a2350;border:1px solid var(--gold);border-radius:14px;padding:6px}
.line{height:4px;background:#33409a;position:absolute;top:34px;right:-50%;width:100%;z-index:-1}
.stat{background:#141a45;border:1px solid #3a4699;border-radius:14px;padding:12px;text-align:center}
.stat b{font-size:1.7rem;display:block;color:var(--neon)}
.tag{display:inline-block;background:#232b60;border:1px solid #3a4699;color:var(--ink);border-radius:999px;padding:6px 12px;margin:3px;font-weight:700;font-size:.92rem}
.tag.weak{background:#5a1526;border-color:var(--bad)}
a.link{color:var(--neon);text-decoration:underline;cursor:pointer}
small.hint{color:var(--muted)}
.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:60}
.badge{position:absolute;top:-9px;right:-9px;min-width:26px;height:26px;padding:0 6px;display:inline-flex;
  align-items:center;justify-content:center;background:#ff2e50;color:#fff;border-radius:999px;font-size:.85rem;
  font-weight:900;box-shadow:0 0 10px rgba(255,46,80,.8);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{50%{transform:scale(1.15)}}
.homebtn{position:fixed;bottom:16px;left:16px;z-index:70;width:56px;height:56px;border-radius:50%;
  font-size:26px;background:linear-gradient(135deg,var(--neon),#2b8bff);color:#04122b;
  box-shadow:0 4px 0 #0a63b8,0 6px 16px rgba(0,229,255,.4);display:none}
.homebtn:active{transform:translateY(3px);box-shadow:0 1px 0 #0a63b8}
.homebtn.show{display:block}
.conf{position:absolute;width:11px;height:15px;opacity:.95;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(112vh) rotate(600deg);opacity:0}}
.shakeit{animation:scr .4s}
@keyframes scr{0%,100%{transform:translate(0,0)}25%{transform:translate(-6px,4px)}50%{transform:translate(6px,-4px)}75%{transform:translate(-4px,-3px)}}
.tiles{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0;min-height:54px}
.tile{background:#232b60;border:2px solid #3a4699;border-radius:12px;padding:12px 15px;font-size:1.2rem;font-weight:900;color:var(--ink)}
.slot{min-height:54px;border:2px dashed #4a58b5;border-radius:14px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.slotchip{background:var(--neon);color:#04122b;border-radius:10px;padding:11px 14px;font-size:1.2rem;font-weight:900}
</style>
</head>

 }catch(e){return blank();}}

/* ---------- spaced repetition (learning engine) ---------- */
function pget(id){return S.prog[id]||(S.prog[id]={m:0,c:0,w:0,next:0,seen:false});}
function grade(id,ok){const p=pget(id);p.seen=true;
  if(ok){p.c++;p.m=Math.min(5,p.m+1);}else{p.w++;p.m=Math.max(0,p.m-1);}
  const gaps=[0,1,2,4,8,16];p.next=now()+(ok?gaps[p.m]*DAY:0.02*DAY);
  S.stats.total++;if(ok)S.stats.correct++;}
function masteredCount(){return WORDS.filter(w=>pget(w.id).m>=4).length;}
function weakWords(){return WORDS.filter(w=>{const p=pget(w.id);return p.seen&&p.m<=1;});}
function dueWords(){return WORDS.filter(w=>{const p=pget(w.id);return p.seen&&p.next<=now()&&p.m<5;});}
function newWords(cap){return WORDS.filter(w=>!pget(w.id).seen&&(!cap||w.unit<=cap));}
function pickDaily(n=14){
  // Balance VARIETY with reinforcement: keep it fresh every battle, but still bring back weak words.
  const cap=Math.min(5,2+Math.floor(masteredCount()/25));   // more units available sooner = bigger pool
  const weak=shuffle(weakWords());          // seen & low mastery -> reinforce (rotated, ~30%)
  const due=shuffle(dueWords());            // spaced-repetition schedule
  const fresh=shuffle(newWords(cap));       // brand-new words
  const pool=shuffle(WORDS.filter(w=>w.unit<=cap && pget(w.id).m<5)); // whole unlocked pool for variety
  const set=[];
  const add=arr=>{for(const w of arr){if(set.length>=n)break;if(!set.includes(w))set.push(w);}};
  add(weak.slice(0,Math.ceil(n*0.3)));      // ~30% struggling words (still a big boost, but rotated)
  add(fresh.slice(0,Math.ceil(n*0.4)));     // ~40% new words for freshness
  add(due);
  add(pool);                                // fill the rest from the whole unlocked vocabulary (varied)
  add(shuffle(WORDS));                      // last resort
  return shuffle(set).slice(0,n);
}

/* ---------- utils ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function show(html){app.innerHTML=html;window.scrollTo(0,0);}
let VOICES=[];
function loadVoices(){try{VOICES=window.speechSynthesis?speechSynthesis.getVoices()||[]:[];}catch(e){VOICES=[];}}
if(window.speechSynthesis){loadVoices();try{speechSynthesis.onvoiceschanged=loadVoices;}catch(e){}}
function pickVoice(){
  if(!VOICES.length)loadVoices();
  const prefs=[
    v=>/google\s*(us|uk)?\s*english/i.test(v.name),                          // Chrome's natural Google voices
    v=>/(natural|neural|enhanced|premium)/i.test(v.name)&&/^en/i.test(v.lang),// high-quality variants
    v=>/^(samantha|ava|allison|zoe|joelle|nicky|aaron|karen|serena|moira)/i.test(v.name)&&/^en/i.test(v.lang), // pleasant Apple voices
    v=>/en[-_]?US/i.test(v.lang),
    v=>/^en/i.test(v.lang)
  ];
  for(const t of prefs){const m=VOICES.find(t);if(m)return m;}
  return null;
}
function speak(t){
  if(!S.settings.speech||!window.speechSynthesis)return;
  try{
    const u=new SpeechSynthesisUtterance(String(t));
    u.lang='en-US';u.rate=.8;u.pitch=1.05;   // slower & warmer = clearer, less robotic
    const v=pickVoice();if(v)u.voice=v;
    if(speechSynthesis.speaking||speechSynthesis.pending)speechSynthesis.cancel();
    speechSynthesis.resume();
    speechSynthesis.speak(u);
  }catch(e){}
}
window._spk=t=>speak(t);
/* audio sfx */
let AC=null;
function ensureAudio(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();}
function tone(freq,dur,type,vol,when){const a=AC;if(!a||!S.settings.sfx)return;const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';o.frequency.value=freq;o.connect(g);g.connect(a.destination);const t=a.currentTime+(when||0);
  g.gain.setValueAtTime(vol||.2,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur);}
function sfx(n,x){
  if(!S.settings.sfx)return;
  if(n==='correct'){tone(660,.12,'triangle',.2);tone(990,.14,'triangle',.15,.08);}
  else if(n==='wrong'){tone(180,.28,'sawtooth',.16);}
  else if(n==='combo'){tone(600+Math.min(x||0,10)*70,.1,'square',.16);}
  else if(n==='win'){[523,659,784,1046,1318].forEach((f,i)=>tone(f,.2,'triangle',.2,i*.11));}
  else if(n==='chest'){[440,660,880,1320].forEach((f,i)=>tone(f,.16,'sine',.18,i*.1));}
  else if(n==='hit'){tone(110,.16,'square',.2);}
  else if(n==='click'){tone(520,.05,'sine',.12);}
}
function confetti(){const c=el('confetti');const cols=['#ffd23f','#25f4a0','#ff2e97','#00e5ff','#a24bff','#ff7a3c'];
  for(let i=0;i<70;i++){const d=document.createElement('div');d.className='conf';d.style.left=Math.random()*100+'vw';

    c.appendChild(d);setTimeout(()=>d.remove(),3400);}}

function checkStreak(){const t=new Date().toDateString();if(S.stats.lastDay===t)return;
  const y=new Date(now()-DAY).toDateString();S.stats.streak=(S.stats.lastDay===y)?S.stats.streak+1:1;S.stats.lastDay=t;save();}

/* ---------- distractors ---------- */
function distractors(correct,keyName,n=3){const cval=correct[keyName];const seen=new Set([cval]);const out=[];
  for(const w of shuffle(WORDS)){if(w.id===correct.id||seen.has(w[keyName]))continue;seen.add(w[keyName]);out.push(w);if(out.length>=n)break;}

async function genStory(i){
  const p=S.profile;const c=charById[S.chars.sel]||CHARS[0];
  const learned=WORDS.filter(w=>pget(w.id).seen).map(w=>w.word).slice(0,20);
  const prompt=`Write a short adventure story for a 10-year-old Israeli girl named ${p.name} who loves ${p.interest}. Her companion is ${c.name}. Use 6-8 SIMPLE, CLEAR Grade-5 English sentences. The story MUST make logical sense and flow naturally like a real story. You may gently reuse a few of these words she is learning, but ONLY where they fit naturally and grammatically: ${learned.join(', ')}. Make it a NEW, different story each time. Warm and encouraging. Return only the story text.`;
  const out=await callAI(prompt);if(out)return out;
  const arr=STORIES[p.interest]||STORIES['בעלי חיים'];
  let idx=Math.random()*arr.length|0;
  if(arr.length>1&&idx===window._lastStoryIdx)idx=(idx+1)%arr.length;  // never repeat the previous story
  window._lastStoryIdx=idx;
  return arr[idx](p.name,c.name);
}
async function callAI(prompt){const s=S.settings;if(s.aiProvider==='off'||!s.aiKey)return null;
  try{if(s.aiProvider==='openai'){const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.aiKey},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:prompt}],max_tokens:400})});const j=await r.json();return j.choices&&j.choices[0]&&j.choices[0].message.content.trim();}
    else if(s.aiProvider==='anthropic'){const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':s.aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-3-5-haiku-latest',max_tokens:400,messages:[{role:'user',content:prompt}]})});const j=await r.json();return j.content&&j.content[0]&&j.content[0].text.trim();}
  }catch(e){return null;}return null;}

  const catRows=Object.entries(cats).sort((a,b)=>(b[1].m/b[1].t)-(a[1].m/a[1].t)).map(([c,v])=>{const p=Math.round(v.m/v.t*100);
    return `<div style="margin:8px 0"><div style="display:flex;justify-content:space-between"><span>${catHe(c)}</span><span class="muted">${v.m}/${v.t}</span></div><div class="bar"><i style="width:${p}%"></i></div></div>`;}).join('');
  let lastPlayed='עדיין לא שיחקה';try{if(S.stats.lastDay)lastPlayed=new Date(S.stats.lastDay).toLocaleDateString('he-IL');}catch(e){}
  let rec;
  if(seen===0)rec='יערה עוד לא התחילה. קרב אחד היום יתחיל את הרצף 🚀';
  else if(weak.length>=8)rec=`יש ${weak.length} מילים שמאתגרות אותה — המשחק כבר מגיש אותן יותר. שווה גם סבב "תרגול".`;
  else if(acc>=85)rec='דיוק גבוה מאוד — היא מוכנה למילים חדשות, שנפתחות אוטומטית.';
  else if(S.stats.streak===0)rec='כדאי לשמור על רצף יומי — אפילו קרב אחד ביום עושה הבדל.';
  else rec='התקדמות יפה ויציבה — כדאי להמשיך באותו קצב 🌟';
  const summary=`${S.profile.name} שיחקה ${S.stats.minutes} דק׳ בסה״כ, שולטת ב-${mastered} מילים, לומדת כרגע ${learning}, ומתקשה ב-${weak.length}. רצף נוכחי: ${S.stats.streak} ימים.`;
  show(`<div class="screen active"><div class="center" style="margin:6px 0"><a class="link" onclick="screenHome()">‹ חזרה</a></div>
   <div class="panel"><h2>📊 תמונת מצב — ${S.profile.name}</h2><p style="font-size:1.05rem;line-height:1.7">${summary}</p></div>
   <div class="panel"><div class="cgrid"><div class="stat"><b>${S.stats.streak}</b>רצף 🔥</div><div class="stat"><b>${S.stats.minutes}</b>דקות ⏱️</div><div class="stat"><b>${mastered}</b>נשלטו ✅</div>
      <div class="stat"><b>${acc}%</b>דיוק 🎯</div><div class="stat"><b>${S.stats.wins}</b>נצחונות ⚔️</div><div class="stat"><b>${S.stats.bestCombo}</b>קומבו שיא 🔥</div></div></div>
   <div class="panel"><h3>שליטה כללית</h3><div class="bar"><i style="width:${Math.round(mastered/total*100)}%"></i></div>
     <p class="muted">${mastered} נשלטו · ${learning} בלמידה · ${total-seen} טרם התחילה · מתוך ${total}</p></div>
   <div class="panel" style="border-color:var(--gold)"><h3>💡 המלצה</h3><p>${rec}</p></div>
   <div class="panel"><h3>מילים לחיזוק 🔴 <small class="muted">(מוגשות לה יותר)</small></h3>
     ${weak.length?weak.slice(0,20).map(w=>`<span class="tag weak">${w.word} · ${w.hebrew}</span>`).join(''):'<p class="muted">אין כרגע — מצוין!</p>'}</div>
   <div class="panel"><h3>התקדמות לפי יחידה 📚</h3>${unitRows}</div>
   <div class="panel"><h3>התקדמות לפי נושא</h3>${catRows}</div>
   <div class="panel"><h3>פעילות</h3><p class="muted">שיחקה לאחרונה: ${lastPlayed} · ימי רצף: ${S.stats.streak} · סה״כ זמן: ${S.stats.minutes} דק׳</p></div>
   <div class="panel"><h3>שינוי קוד הורים 🔑</h3>
     <input id="newpin" inputmode="numeric" maxlength="4" placeholder="קוד חדש (4 ספרות)" style="text-align:center;letter-spacing:6px">
     <div style="height:8px"></div><button class="btn" onclick="setPin()">עדכן קוד</button><p id="pinok" class="muted"></p></div>
   <div class="panel"><button class="btn ghost" onclick="if(confirm('לאפס את כל ההתקדמות?')){localStorage.removeItem(KEY);location.reload();}">איפוס נתונים</button></div>
  </div>`);}
function catHe(c){return {general:'כללי',verbs:'פעלים',adjectives:'שמות תואר',family:'משפחה',clothes:'ביגוד',time:'זמן','times-of-day':'שעות היום',body:'גוף',camping:'קמפינג',directions:'הכוונה',food:'אוכל',vegetables:'ירקות',people:'אנשים',olympics:'אולימפיאדה',art:'אומנות',home:'בית',music:'מוזיקה',calendar:'לוח שנה',numbers:'מספרים',trips:'טיולים',phrases:'ביטויים'}[c]||c;}

/* expose + boot */
window.screenHome=screenHome;window.screenChars=screenChars;window.screenRoad=screenRoad;window.screenPractice=screenPractice;window.screenSettings=screenSettings;window.speak=speak;window.KEY=KEY;
(function boot(){if(!WORDS.length){app.innerHTML='<div class="panel">שגיאה: קובץ המילים לא נטען.</div>';return;}
  const hb=el('homebtn');if(hb&&S.profile)hb.classList.add('show');
  if(!S.profile)screenOnboard();else screenHome();})();
/* auto-update: if a newer version is deployed, load it automatically (beats browser cache) */
(function checkForUpdate(){
  try{
    if(location.protocol==='file:')return;
    if(/[?&]ver=/.test(location.search))return;            // already reloaded to a specific version
    fetch(location.pathname+'?cb='+Date.now(),{cache:'no-store'}).then(r=>r.text()).then(html=>{
      const m=html.match(/APP_VER=['"](v\d+)['"]/);
      if(m&&m[1]!==APP_VER){location.replace(location.pathname+'?ver='+m[1]);}
    }).catch(()=>{});
  }catch(e){}
})();
</script>
